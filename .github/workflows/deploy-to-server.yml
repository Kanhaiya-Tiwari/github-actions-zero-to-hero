# This workflow deploys the safe/secure/tested app to the production server via SSH
name: Deploy to server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Copy docker-compose file to the server ───────────────────────────────
      - name: Copy docker-compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/devops/"

      # ─── SSH into server and run all deployment steps ─────────────────────────
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Starting Deployment ==="
            mkdir -p ~/devops

            # ── Install Docker if not present ──────────────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg lsb-release

              # Add Docker's official GPG key
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              # Add Docker repo
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
                | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              echo "Docker installation complete."
            else
              echo "Docker already installed: $(docker --version)"
            fi

            # ── Install Docker Compose plugin if not present ───────────────────
            if ! docker compose version &> /dev/null; then
              echo "Docker Compose plugin not found. Installing..."
              sudo apt-get install -y docker-compose-plugin
              echo "Docker Compose plugin installed."
            else
              echo "Docker Compose already available: $(docker compose version)"
            fi

            # ── Enable & restart Docker service ───────────────────────────────
            sudo systemctl enable docker
            sudo systemctl restart docker
            sudo systemctl is-active --quiet docker \
              && echo "Docker service is running ✅" \
              || echo "Docker service FAILED to start ❌"

            # ── Add current user to docker group ──────────────────────────────
            sudo usermod -aG docker $USER || true

            # ── Write .env file for Docker Compose ────────────────────────────
            # (sudo -E drops env vars, so we persist them via .env file)
            cat > ~/devops/.env <<EOF
            DOCKERHUB_USER=${{ secrets.DOCKERHUB_USERNAME }}
            DOCKER_TAG=${{ github.sha }}
            EOF
            echo "─── .env contents ───"
            cat ~/devops/.env

            # ── Deploy with Docker Compose ────────────────────────────────────
            cd ~/devops
            echo "Pulling image: ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-app:${{ github.sha }}"
            sudo -E docker compose pull
            sudo -E docker compose down --remove-orphans
            sudo -E docker compose up -d --force-recreate
            echo ""
            echo "=== Running containers ==="
            sudo docker ps
            echo "=== Deployment complete ✅ ==="
