name: 🚀 Deploy to GitHub Pages

on:
    push:
        branches:
            - Kanha # Deploy on every push to Kanha branch
    workflow_dispatch: # Allow manual trigger from GitHub Actions tab

# Give GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
    contents: write
    pages: write
    id-token: write

# Only one deployment at a time; cancel any in-progress run
concurrency:
    group: "pages-deploy"
    cancel-in-progress: true

jobs:
    # ─────────────────────────────────────────────────────────────────────────
    # JOB 1 ── Lint Python code (CI check before deploying)
    # ─────────────────────────────────────────────────────────────────────────
    lint:
        name: 🐍 Python Lint Check
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12"]
        steps:
            - name: 📥 Checkout Code
              uses: actions/checkout@v4

            - name: 🐍 Setup Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: 📦 Install Dependencies
              run: pip install -r requirements.txt flake8

            - name: 🔍 Run Linter
              run: flake8 app.py --max-line-length=120

    # ─────────────────────────────────────────────────────────────────────────
    # JOB 2 ── Build & Deploy static site to GitHub Pages
    # ─────────────────────────────────────────────────────────────────────────
    deploy:
        name: 🌐 Deploy to GitHub Pages
        runs-on: ubuntu-latest
        needs: lint # Only deploy if lint passes

        steps:
            # ── 1. Checkout ────────────────────────────────────────────────────────
            - name: 📥 Checkout Repository
              uses: actions/checkout@v4
              with:
                  ref: Kanha

            # ── 2. Prepare static site directory ──────────────────────────────────
            - name: 📁 Prepare Static Site
              run: |
                  mkdir -p ./site

                  # Copy the main HTML page from Flask templates → site root
                  cp templates/index.html ./site/index.html

                  # Copy CNAME for custom domain (portfolio.BuildWithKanha.shop)
                  if [ -f CNAME ]; then
                    cp CNAME ./site/CNAME
                    echo "✅ Custom domain: $(cat CNAME)"
                  fi

                  # Copy README so visitors can read project details
                  if [ -f README.md ]; then
                    cp README.md ./site/README.md
                  fi

                  echo ""
                  echo "📂 Site contents ready to deploy:"
                  ls -la ./site/

            # ── 3. Show deployment info ────────────────────────────────────────────
            - name: 📋 Deployment Info
              run: |
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "  📦 Repo    : ${{ github.repository }}"
                  echo "  🌿 Branch  : ${{ github.ref_name }}"
                  echo "  🔖 Commit  : ${{ github.sha }}"
                  echo "  👤 Actor   : ${{ github.actor }}"
                  echo "  🕑 Time    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # ── 4. Deploy to gh-pages branch ──────────────────────────────────────
            - name: 🚀 Push to gh-pages Branch
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./site
                  publish_branch: gh-pages
                  user_name: "github-actions[bot]"
                  user_email: "github-actions[bot]@users.noreply.github.com"
                  commit_message: "🚀 deploy: ${{ github.sha }} — auto deployed from Kanha branch"
                  full_commit_message: |
                      🚀 Deployed from Kanha branch

                      Commit : ${{ github.sha }}
                      Actor  : ${{ github.actor }}
                      Time   : $(date -u '+%Y-%m-%d %H:%M UTC')
