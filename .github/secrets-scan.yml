# using gitleaks to detects code security checks

name: Secret Scan

on:
  workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
          - name: code checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: run gitleaks scanner
            uses: gitleaks/gitleaks-action@v2
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         
           

            